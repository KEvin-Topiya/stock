<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock + IPO</title>
<style>
/* Stock Ticker */
.ticker-wrapper {
  width: 100%;
  overflow: hidden;
  background: #111;
  color: white;
  padding: 10px 0;
  font-family: Arial, sans-serif;
  border-top: 2px solid #333;
  border-bottom: 2px solid #333;
}
.ticker {
  display: inline-block;
  white-space: nowrap;
  animation: scrollTicker 40s linear infinite;
  font-size: 14px;
}
.stock {
  margin-right: 40px;
}
.green { color: #00ff9c; }
.red { color: #ff4d4d; }
@keyframes scrollTicker {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* IPO Table */
.ipo-widget {
  max-width: 1000px;
  margin: 20px auto;
  font-family: Arial, sans-serif;
  color: #1f2937;
  background: #f1f5f9;
  border-radius: 8px;
  padding: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.ipo-widget h2 { text-align:center; margin-bottom:15px; font-size:22px; color:#0f172a; }
.ipo-table { width:100%; border-collapse:collapse; }
.ipo-table th, .ipo-table td { padding:10px 8px; border:1px solid #cbd5e1; text-align:left; font-size:14px; }
.ipo-table th { background:#0f172a; color:white; }
.ipo-table tr:nth-child(even){ background:#e2e8f0; }
.ipo-table tr:hover{ background:#cbd5e1; }
</style>
</head>
<body>

<div class="ticker-wrapper">
  <div class="ticker" id="stockTicker">Loading market data...</div>
</div>

<div class="ipo-widget">
  <h2>Upcoming IPOs</h2>
  <table class="ipo-table" id="ipoTable">
    <thead>
      <tr>
        <th>Company</th>
        <th>Open Date</th>
        <th>Close Date</th>
        <th>Price Band</th>
        <th>Lot Size</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="5">Loading IPO data...</td></tr>
    </tbody>
  </table>
</div>

<script>
// Stock Ticker
async function loadStocks() {
  const tickerEl = document.getElementById("stockTicker");
  tickerEl.innerText = "Loading market data...";

  try {
    const res = await fetch("https://portal.tradebrains.in/api/index/constitients/NIFTY/?ascending=false&by=per_change&format=json&page=1&per_page=25");
    const data = await res.json();
    let html = "";
    data.results.forEach(stock => {
      html += `<span class="stock">${stock.symbol} <span class="${stock.per_change>=0?'green':'red'}">${stock.per_change}%</span></span>`;
    });
    tickerEl.innerHTML = html;
  } catch(e) {
    tickerEl.innerText = "Error loading market data";
  }

  // Random next fetch 2-10 min
  const delay = Math.floor(Math.random()*(10-2)*60000) + 2*60000;
  setTimeout(loadStocks, delay);
}
loadStocks();

// IPO Table
async function loadIPOData() {
  const url = "https://webnodejs.chittorgarh.com/cloud/report/data-read/82/1/3/2026/2025-26/0/all/0?search=&v=19-30";
  const tbody = document.querySelector("#ipoTable tbody");
  tbody.innerHTML = "<tr><td colspan='5'>Loading IPO data...</td></tr>";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const ipos = data.result || []; // ✅ Access the array
    if(ipos.length===0){
      tbody.innerHTML = "<tr><td colspan='5'>No IPO data</td></tr>";
      return;
    }

    tbody.innerHTML = "";
    ipos.forEach(ipo => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${ipo.company_name || ipo.name || "N/A"}</td>
        <td>${ipo.open_date || "N/A"}</td>
        <td>${ipo.close_date || "N/A"}</td>
        <td>${ipo.price_band || ipo.price || "N/A"}</td>
        <td>${ipo.lot_size || "N/A"}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch(e){
    console.error("IPO fetch error", e);
    tbody.innerHTML = "<tr><td colspan='5'>Failed to load IPO data</td></tr>";
  }
}

loadIPOData();
setInterval(loadIPOData, 10*60*1000);
</script>

</body>
</html>
