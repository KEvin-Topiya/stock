<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock & IPO Marquee</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }

  /* ===== STOCK TICKER ===== */
  .ticker-wrapper, .ipo-ticker-wrapper {
    width: 100%;
    overflow: hidden;
    background: #111;
    color: white;
    padding: 10px 0;
    border-top: 2px solid #333;
    border-bottom: 2px solid #333;
    margin-bottom: 20px;
  }

  .ticker, .ipo-ticker {
    display: inline-block;
    white-space: nowrap;
    animation: scrollTicker 40s linear infinite;
    font-size: 14px;
  }

  .green { color: #00ff9c; }
  .red { color: #ff4d4d; }

  @keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }

  /* ===== IPO MARQUEE CARD ===== */
  .ipo-card {
    display: inline-block;
    margin-right: 50px;
    color: #ffd700;
    font-weight: bold;
  }
</style>
</head>
<body>

  <!-- STOCK TICKER -->
  <div class="ticker-wrapper">
    <div class="ticker" id="stockTicker">Loading NIFTY market data...</div>
  </div>

  <!-- IPO TICKER -->
  <div class="ipo-ticker-wrapper">
    <div class="ipo-ticker" id="ipoTicker">Loading IPO data...</div>
  </div>

<script>
  // ===== STOCK TICKER =====
  async function loadStocks() {
    const url = "https://portal.tradebrains.in/api/index/constitients/NIFTY/?ascending=false&by=per_change&format=json&page=1&per_page=25";
    try {
      const response = await fetch(url);
      const data = await response.json();
      const stocks = data.results || [];
      const ticker = document.getElementById("stockTicker");

      if (stocks.length === 0) {
        ticker.innerText = "No stock data available";
        return;
      }

      ticker.innerHTML = stocks.map(s => {
        const colorClass = s.per_change >= 0 ? "green" : "red";
        return `<span class="${colorClass}" style="margin-right:40px;">${s.symbol} ${s.per_change}%</span>`;
      }).join('');

    } catch(err) {
      console.error("Stock API error:", err);
      document.getElementById("stockTicker").innerText = "Error loading market data";
    }

    // Random refresh 2–10 minutes
    const min = 2*60*1000;
    const max = 10*60*1000;
    const randomDelay = Math.floor(Math.random()*(max-min))+min;
    setTimeout(loadStocks, randomDelay);
  }
  loadStocks();

  // ===== IPO MARQUEE =====
  async function loadIPO() {
    const url = "https://b.jpassociate.co.in/ipo";
    try {
      const response = await fetch(url);
      const data = await response.json();
      const ipoList = data?.ipoDropDownList || [];
      const ticker = document.getElementById("ipoTicker");

      if(ipoList.length === 0){
        ticker.innerText = "No IPO data available";
        return;
      }

      ticker.innerHTML = ipoList.map(ipo=>{
        return `<span class="ipo-card">
          ${ipo.ipo_news_title} | ${ipo.ipo_period || 'N/A'} | ${ipo.issue_category || 'N/A'}
        </span>`;
      }).join('');

    } catch(err){
      console.error("IPO API error:", err);
      document.getElementById("ipoTicker").innerText = "Error loading IPO data";
    }

    // Refresh every 10 minutes
    setTimeout(loadIPO, 10*60*1000);
  }
  loadIPO();
</script>

</body>
</html>
